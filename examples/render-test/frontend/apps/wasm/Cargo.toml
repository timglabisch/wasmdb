[package]
name = "render-test-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
sync-client = { workspace = true }
database = { workspace = true, features = ["borsh", "serde"] }
render-test-domain = { path = "../../../shared/domain" }
tables = { workspace = true }
tables-client = { workspace = true }
sql-engine = { workspace = true }
sql-parser = { workspace = true }
requirements = { workspace = true }
borsh = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

[build-dependencies]
tables-codegen = { workspace = true }
