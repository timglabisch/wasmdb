[package]
name = "render-test-server"
version = "0.1.0"
edition = "2021"

# Echo-server: no DB. /command echoes client_zset back as Verdict::Confirmed.
# /table-fetch returns 404 — render-test doesn't use parameterized fetchers.
[dependencies]
sync = { workspace = true }
render-test-domain = { path = "../shared/domain" }
borsh = { version = "1", features = ["derive"] }
axum = "0.7"
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["fs"] }
