[package]
name = "projection-demo-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

# Surface is intentionally minimal: the heavy lifting lives in
# `sync-client::wasm`. The macro `define_wasm_api!` expands here and
# references the codegen-emitted `register_all_tables` and
# `register_all_projections` (built in build.rs from the domain crate's
# `#[row]` / `#[projection]` declarations). `database-projection` is a
# direct dep because the generated `register_all_projections` names
# `::database_projection::ProjectionEngine`.
[dependencies]
sync-client = { workspace = true }
database = { workspace = true, features = ["borsh", "serde"] }
database-projection = { workspace = true }
projection-demo-domain = { path = "../../../shared/domain" }
tables = { workspace = true }
tables-client = { workspace = true }
sql-engine = { workspace = true }
sql-parser = { workspace = true }
requirements = { workspace = true }
borsh = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

[build-dependencies]
tables-codegen = { workspace = true }
