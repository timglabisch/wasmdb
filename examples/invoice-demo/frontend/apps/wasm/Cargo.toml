[package]
name = "invoice-demo-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

# Surface is intentionally minimal: the heavy lifting (state, streams,
# requirements, query/exec wasm-bindgen exports, debug toolbar) lives
# in `sync-client::wasm`. The macro `define_wasm_api!` expands here and
# only references `wasm_bindgen`, `js_sys`, `database`, and `sync_client`.
# Client-side row/fetcher/wasm-binding code is generated in `build.rs`
# from the `shared/domain` crate's `#[row]` / `#[query]` declarations.
[dependencies]
sync-client = { workspace = true }
database = { workspace = true, features = ["borsh", "serde"] }
invoice-demo-domain = { path = "../../../shared/domain" }
tables = { workspace = true }
tables-client = { workspace = true }
sql-engine = { workspace = true }
sql-parser = { workspace = true }
requirements = { workspace = true }
borsh = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

[build-dependencies]
tables-codegen = { workspace = true }
