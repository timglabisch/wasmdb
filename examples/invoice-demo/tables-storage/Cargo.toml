[package]
name = "invoice-demo-tables-storage"
version = "0.1.0"
edition = "2021"

# Storage-side facade for invoice-demo tables. Native only. Re-exports
# the shared crate (which holds the StorageTable impls) and is the
# place for storage-only glue: runtime registration, sqlx bridge,
# background jobs.

[dependencies]
invoice-demo-tables = { path = "../tables", features = ["storage"] }
tables = { path = "../../../crates/tables" }
tables-storage = { path = "../../../crates/tables-storage" }
