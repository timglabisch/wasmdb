[package]
name = "sync-demo-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
sync = { path = "../../../crates/sync", features = ["serde"] }
sync-client = { path = "../../../crates/sync-client" }
sync-demo-commands = { path = "../commands" }
database = { path = "../../../crates/database", features = ["borsh", "serde"] }
database-reactive = { path = "../../../crates/database-reactive", features = ["borsh", "serde"] }
sql-engine = { path = "../../../crates/sql-engine", features = ["borsh", "serde", "wasm-timing"] }
sql-parser = { path = "../../../crates/sql-parser" }
wasmdb-debug = { path = "../../../crates/wasmdb-debug" }
borsh = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Request", "RequestInit", "Response", "Headers", "Window",
    "console",
] }
