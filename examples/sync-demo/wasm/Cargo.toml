[package]
name = "sync-demo-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

# Surface is intentionally minimal: state, streams, query/exec/debug
# wasm-bindgen exports all live in `sync-client::wasm`. The
# `define_wasm_api!` macro expands here and references only
# `wasm_bindgen`, `database`, and `sync_client`.
[dependencies]
sync-client = { workspace = true }
sync-demo-commands = { path = "../commands" }
database = { workspace = true, features = ["borsh", "serde"] }
sql-engine = { workspace = true, features = ["borsh", "serde"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
