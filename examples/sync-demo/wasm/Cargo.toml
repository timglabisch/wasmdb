[package]
name = "sync-demo-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
sync = { workspace = true, features = ["serde"] }
sync-client = { workspace = true }
sync-demo-commands = { path = "../commands" }
database = { workspace = true, features = ["borsh", "serde"] }
database-reactive = { workspace = true, features = ["borsh", "serde"] }
sql-engine = { workspace = true, features = ["borsh", "serde", "wasm-timing"] }
sql-parser = { workspace = true }
wasmdb-debug = { workspace = true }
borsh = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Request", "RequestInit", "Response", "Headers", "Window",
    "console",
] }
