[package]
name = "sync-demo-commands"
version = "0.1.0"
edition = "2021"

[dependencies]
sync = { workspace = true }
database = { workspace = true, features = ["borsh"] }
sql-engine = { workspace = true, features = ["borsh"] }
sqlbuilder = { workspace = true, features = ["sql-engine"] }
borsh = { version = "1", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
ts-rs = { version = "12", features = ["serde-compat"] }
